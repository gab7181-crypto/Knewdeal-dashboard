<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-뉴딜아카데미 모집 현황 대시보드</title>
    <!-- Tailwind CSS v4 Browser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased tracking-tight">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_COURSES = [
            { id: 'course-1', name: '(1기) 라이브커머스 전문가과정' },
            { id: 'course-2', name: '(1기) MD & 바잉 실무과정' },
        ];

        function App() {
            const [courses, setCourses] = useState(() => {
                const saved = localStorage.getItem('nd_courses');
                return saved ? JSON.parse(saved) : INITIAL_COURSES;
            });

            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('nd_logs');
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('summary');
            
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                courseId: courses[0]?.id || INITIAL_COURSES[0].id,
                funnel_1_inflow: 0,
                funnel_2_contact: 0,
                funnel_3_doc_pass: 0,
                funnel_4_interview: 0,
                funnel_5_final_pass: 0
            });

            const [newCourseName, setNewCourseName] = useState('');
            const funnelChartRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('nd_courses', JSON.stringify(courses));
            }, [courses]);

            useEffect(() => {
                localStorage.setItem('nd_logs', JSON.stringify(logs));
                if (activeTab === 'summary') {
                    renderCharts();
                }
            }, [logs, activeTab, courses]);

            const getAccumulatedData = () => {
                const summary = { inflow: 0, contact: 0, doc_pass: 0, interview: 0, final_pass: 0 };
                const courseBreakdown = {};

                courses.forEach(c => {
                    courseBreakdown[c.id] = { name: c.name, inflow: 0, contact: 0, doc_pass: 0, interview: 0, final_pass: 0 };
                });

                logs.forEach(log => {
                    summary.inflow += Number(log.funnel_1_inflow || 0);
                    summary.contact += Number(log.funnel_2_contact || 0);
                    summary.doc_pass += Number(log.funnel_3_doc_pass || 0);
                    summary.interview += Number(log.funnel_4_interview || 0);
                    summary.final_pass += Number(log.funnel_5_final_pass || 0);

                    if (courseBreakdown[log.courseId]) {
                        courseBreakdown[log.courseId].inflow += Number(log.funnel_1_inflow || 0);
                        courseBreakdown[log.courseId].contact += Number(log.funnel_2_contact || 0);
                        courseBreakdown[log.courseId].doc_pass += Number(log.funnel_3_doc_pass || 0);
                        courseBreakdown[log.courseId].interview += Number(log.funnel_4_interview || 0);
                        courseBreakdown[log.courseId].final_pass += Number(log.funnel_5_final_pass || 0);
                    }
                });

                return { summary, courseBreakdown };
            };

            const { summary, courseBreakdown } = getAccumulatedData();

            const renderCharts = () => {
                setTimeout(() => {
                    const ctxFunnel = document.getElementById('funnelChart');
                    if (ctxFunnel) {
                        if (funnelChartRef.current) funnelChartRef.current.destroy();

                        const ctx = ctxFunnel.getContext('2d');
                        
                        const unifiedBlueGradient = ctx.createLinearGradient(0, 0, ctxFunnel.width, 0);
                        unifiedBlueGradient.addColorStop(0, '#2563eb'); 
                        unifiedBlueGradient.addColorStop(1, '#60a5fa'); 

                        funnelChartRef.current = new Chart(ctxFunnel, {
                            type: 'bar',
                            data: {
                                labels: ['유입', '컨택', '서류 합격', '면접 완료', '최종 합격'],
                                datasets: [{
                                    label: '누적 인원',
                                    data: [summary.inflow, summary.contact, summary.doc_pass, summary.interview, summary.final_pass],
                                    backgroundColor: [unifiedBlueGradient, unifiedBlueGradient, unifiedBlueGradient, unifiedBlueGradient, unifiedBlueGradient],
                                    borderWidth: 0,
                                    borderRadius: 4,
                                    barThickness: 14,
                                }]
                            },
                            options: { 
                                indexAxis: 'y',
                                responsive: true,
                                maintainAspectRatio: false,
                                layout: {
                                    padding: { top: 0, bottom: 0 }
                                },
                                plugins: { 
                                    legend: { display: false },
                                    tooltip: {
                                        padding: 10,
                                        bodyFont: { size: 13, family: "system-ui, -apple-system, sans-serif", weight: 'bold' },
                                        callbacks: {
                                            label: function(context) {
                                                return ` 현재 상태: ${context.raw} 명`;
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    x: { 
                                        display: false, 
                                        beginAtZero: true,
                                        min: 0,
                                        max: 100 
                                    },
                                    y: { display: false }
                                }
                            }
                        });
                    }
                }, 50);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmitLog = (e) => {
                e.preventDefault();
                const newLog = { ...formData, id: 'log-' + Date.now() };
                setLogs(prev => [newLog, ...prev]);
                alert('일일 데이터가 기록되었습니다.');
                setFormData(prev => ({
                    ...prev,
                    funnel_1_inflow: 0,
                    funnel_2_contact: 0,
                    funnel_3_doc_pass: 0,
                    funnel_4_interview: 0,
                    funnel_5_final_pass: 0
                }));
            };

            const handleAddCourse = (e) => {
                e.preventDefault();
                if (!newCourseName.trim()) return;
                const newCourse = { id: 'course-' + Date.now(), name: newCourseName.trim() };
                setCourses(prev => [...prev, newCourse]);
                setNewCourseName('');
                alert('새로운 교육 과정이 등록되었습니다.');
            };

            const handleDataExport = () => {
                const dataStr = JSON.stringify({ courses, logs }, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `k-newdeal-backup-${new Date().toISOString().split('T')[0]}.json`;
                
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleDataImport = (e) => {
                if(!e.target.files || e.target.files.length === 0) return;
                const fileReader = new FileReader();
                fileReader.readAsText(e.target.files[0], "UTF-8");
                fileReader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.courses && parsed.logs) {
                            setCourses(parsed.courses);
                            setLogs(parsed.logs);
                            alert('백업 파일 데이터 복구가 완료되었습니다!');
                        } else {
                            alert('올바르지 않은 백업 파일 양식입니다.');
                        }
                    } catch (err) {
                        alert('파일을 읽는 중 오류가 발생했습니다.');
                    }
                };
            };

            const handleClearAll = () => {
                if (confirm('정말로 모든 데이터를 초기화하시겠습니까? 복구할 수 없습니다.')) {
                    localStorage.clear();
                    setCourses(INITIAL_COURSES);
                    setLogs([]);
                    alert('모든 데이터가 초기화되었습니다.');
                }
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    {/* 상단 타이틀 헤더 */}
                    <header className="mb-8 border-b border-gray-200 pb-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">K-뉴딜아카데미 모집 현황 대시보드</h1>
                            <p className="text-sm text-gray-500 mt-2 font-medium">과정별 모집 유입 · 전형 현황 실시간 일일 로컬 관리 시스템</p>
                        </div>
                        
                        <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-xs flex items-center gap-2 max-w-full overflow-x-auto">
                            <span className="text-xs font-bold text-gray-700 whitespace-nowrap px-1">💾 로컬 백업:</span>
                            <button onClick={handleDataExport} className="border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-xs font-bold hover:bg-gray-50 transition-colors whitespace-nowrap">
                                내보내기 (.json)
                            </button>
                            <label className="border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-xs font-bold text-center hover:bg-gray-50 transition-colors cursor-pointer whitespace-nowrap">
                                가져오기
                                <input type="file" accept=".json" onChange={handleDataImport} className="hidden" />
                            </label>
                            <button onClick={handleClearAll} className="bg-red-50 text-red-600 px-3 py-1.5 rounded-md text-xs font-bold hover:bg-red-100 transition-colors whitespace-nowrap">
                                초기화
                            </button>
                        </div>
                    </header>

                    {/* 상단 내비게이션 탭 */}
                    <div className="flex border-b border-gray-200 mb-8 bg-white p-1 rounded-lg shadow-sm">
                        <button 
                            onClick={() => setActiveTab('summary')}
                            className={`flex-1 py-3 text-center font-bold text-sm rounded-md transition-colors ${activeTab === 'summary' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-700 hover:text-gray-900 hover:bg-gray-50'}`}
                        >
                            📊 모집 현황 대시보드 요약
                        </button>
                        <button 
                            onClick={() => setActiveTab('input')}
                            className={`flex-1 py-3 text-center font-bold text-sm rounded-md transition-colors ${activeTab === 'input' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-700 hover:text-gray-900 hover:bg-gray-50'}`}
                        >
                            📝 일일 데이터 입력 / 과정 관리
                        </button>
                    </div>

                    {/* 탭 1: 대시보드 메인 화면 */}
                    {activeTab === 'summary' && (
                        <div className="space-y-6 animate-fade-in">
                            {/* 핵심 지표 스코어카드 */}
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center"><p className="text-xs font-bold text-gray-500 uppercase">총 유입</p><p className="text-2xl font-extrabold text-blue-600 mt-1">{summary.inflow}명</p></div>
                                <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center"><p className="text-xs font-bold text-gray-500 uppercase">총 컨택</p><p className="text-2xl font-extrabold text-gray-700 mt-1">{summary.contact}명</p></div>
                                <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center"><p className="text-xs font-bold text-gray-500 uppercase">서류 합격</p><p className="text-2xl font-extrabold text-gray-700 mt-1">{summary.doc_pass}명</p></div>
                                <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center"><p className="text-xs font-bold text-gray-500 uppercase">면접 완료</p><p className="text-2xl font-extrabold text-gray-700 mt-1">{summary.interview}명</p></div>
                                <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center"><p className="text-xs font-bold text-gray-500 uppercase">최종 합격</p><p className="text-2xl font-extrabold text-emerald-600 mt-1">{summary.final_pass}명</p></div>
                            </div>

                            {/* 차트 시각화 영역 */}
                            <div className="w-full bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                                <div className="mb-4">
                                    <h3 className="text-base font-bold text-gray-900 tracking-tight">전체 전형 퍼널</h3>
                                </div>
                                
                                <div className="flex w-full h-[160px]">
                                    <div className="flex flex-col justify-around items-end pr-4 text-xs font-bold text-gray-700 w-[100px] h-full py-[4px]">
                                        <div>유입</div>
                                        <div>컨택</div>
                                        <div>서류 합격</div>
                                        <div>면접 완료</div>
                                        <div>최종 합격</div>
                                    </div>
                                    <div className="relative flex-1 h-full">
                                        <canvas id="funnelChart"></canvas>
                                    </div>
                                </div>
                            </div>

                            {/* 과정별 상세 데이터 테이블 */}
                            <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                                <div className="px-6 py-4 border-b border-gray-100">
                                    <h3 className="text-base font-bold text-gray-900 tracking-tight">과정별 모집 현황 상세</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-gray-50 text-xs font-bold text-gray-700 border-b border-gray-100">
                                                {/* 픽스 완료: '과정명' 타이틀을 text-center로 가운데 정렬 */}
                                                <th className="p-4 text-center">과정명</th>
                                                <th className="p-4 text-gray-500 text-center">정원</th>
                                                <th className="p-4 text-center">유입</th>
                                                <th className="p-4 text-center">컨택</th>
                                                <th className="p-4 text-center">서류합격</th>
                                                <th className="p-4 text-center">면접완료</th>
                                                <th className="p-4 text-center">최종합격</th>
                                                <th className="p-4 text-emerald-700 text-center">달성률</th>
                                                <th className="p-4 text-center">모집 상태</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100 text-sm font-bold text-gray-700">
                                            {Object.values(courseBreakdown).map((data, idx) => {
                                                const quota = 50; 
                                                const achievementRate = ((data.final_pass / quota) * 100).toFixed(1); 
                                                const isFull = data.final_pass >= quota; 

                                                return (
                                                    <tr key={idx} className="hover:bg-gray-50">
                                                        {/* 긴 텍스트의 가독성 확보를 위해 데이터 내용은 왼쪽 정렬 유지 */}
                                                        <td className="p-4 font-bold text-gray-900 text-left">{data.name}</td>
                                                        <td className="p-4 text-gray-500 text-center">{quota}명</td>
                                                        <td className="p-4 text-blue-600 text-center">{data.inflow}</td>
                                                        <td className="p-4 text-gray-700 text-center">{data.contact}</td>
                                                        <td className="p-4 text-gray-700 text-center">{data.doc_pass}</td>
                                                        <td className="p-4 text-gray-700 text-center">{data.interview}</td>
                                                        <td className="p-4 text-emerald-600 text-center">{data.final_pass}</td>
                                                        <td className="p-4 font-bold text-gray-900 text-center">{achievementRate}%</td>
                                                        <td className="p-4 text-center">
                                                            {isFull ? (
                                                                <span className="bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-md text-xs font-bold inline-block border border-emerald-200">달성</span>
                                                            ) : (
                                                                <span className="bg-amber-50 text-amber-600 px-2.5 py-1 rounded-md text-xs font-bold inline-block border border-amber-200">미달</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 탭 2: 데이터 입력 및 관리 화면 */}
                    {activeTab === 'input' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 animate-fade-in">
                            <div className="md:col-span-2 space-y-6">
                                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                                    <h3 className="text-lg font-bold text-gray-900 mb-2">일일 데이터 추가 입력</h3>
                                    <p className="text-xs text-gray-400 mb-6">당일 새로 발생한 수치만 입력하세요. 시스템이 자동으로 누적 합산합니다.</p>
                                    
                                    <form onSubmit={handleSubmitLog} className="space-y-4">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-500 mb-1">기준 날짜</label>
                                                <input type="date" name="date" value={formData.date} onChange={handleInputChange} required className="w-full p-2 border border-gray-200 rounded-md text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-500 mb-1">대상 교육 과정</label>
                                                <select name="courseId" value={formData.courseId} onChange={handleInputChange} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-white font-bold">
                                                    {courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <hr className="border-gray-100 my-4" />
                                        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                            <div><label className="block text-xs text-gray-500 mb-1">1. 유입 건수</label><input type="number" min="0" name="funnel_1_inflow" value={formData.funnel_1_inflow} onChange={handleInputChange} className="w-full p-2 border border-gray-200 rounded-md text-sm font-bold" /></div>
                                            <div><label className="block text-xs text-gray-500 mb-1">2. 컨택 건수</label><input type="number" min="0" name="funnel_2_contact" value={formData.funnel_2_contact} onChange={handleInputChange} className="w-full p-2 border border-gray-200 rounded-md text-sm font-bold" /></div>
                                            <div><label className="block text-xs text-gray-500 mb-1">3. 서류 합격</label><input type="number" min="0" name="funnel_3_doc_pass" value={formData.funnel_3_doc_pass} onChange={handleInputChange} className="w-full p-2 border border-gray-200 rounded-md text-sm font-bold" /></div>
                                            <div><label className="block text-xs text-gray-500 mb-1">4. 면접 완료</label><input type="number" min="0" name="funnel_4_interview" value={formData.funnel_4_interview} onChange={handleInputChange} className="w-full p-2 border border-gray-200 rounded-md text-sm font-bold" /></div>
                                            <div><label className="block text-xs text-gray-500 mb-1">5. 최종 합격</label><input type="number" min="0" name="funnel_5_final_pass" value={formData.funnel_5_final_pass} onChange={handleInputChange} className="w-full p-2 border border-gray-200 rounded-md text-sm font-bold" /></div>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-md text-sm font-bold hover:bg-blue-700 transition-colors shadow-sm mt-4">데이터 기록 저장하기</button>
                                    </form>
                                </div>

                                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                                    <h3 className="text-md font-bold text-gray-900 mb-4">최근 입력 이력 (로그)</h3>
                                    <div className="overflow-x-auto max-h-60 overflow-y-auto text-xs">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="bg-gray-50 text-gray-400 border-b border-gray-100 font-bold">
                                                    <th className="p-2">날짜</th><th className="p-2">과정명</th><th className="p-2">유입</th><th className="p-2">최종합격</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50 font-bold text-gray-700">
                                                {logs.length === 0 ? (
                                                    <tr><td colSpan="4" className="p-4 text-center text-gray-400">등록된 이력이 없습니다.</td></tr>
                                                ) : logs.map(log => (
                                                    <tr key={log.id} className="hover:bg-gray-50">
                                                        <td className="p-2 font-mono">{log.date}</td>
                                                        <td className="p-2 truncate max-w-xs">{courses.find(c => c.id === log.courseId)?.name || '삭제된 과정'}</td>
                                                        <td className="p-2 text-blue-600 font-bold">{log.funnel_1_inflow}</td>
                                                        <td className="p-2 text-emerald-600 font-bold">{log.funnel_5_final_pass}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                                    <h3 className="text-sm font-bold text-gray-900 mb-4">🆕 교육 과정 추가 등록</h3>
                                    <form onSubmit={handleAddCourse} className="space-y-2">
                                        <input type="text" placeholder="새로운 과정명 입력" value={newCourseName} onChange={(e) => setNewCourseName(e.target.value)} className="w-full p-2 border border-gray-200 rounded-md text-sm font-bold" />
                                        <button type="submit" className="w-full bg-gray-800 text-white py-2 rounded-md text-xs font-bold hover:bg-gray-900 transition-colors">새 과정 마스터 등록</button>
                                    </form>
                                    <ul className="mt-4 border-t border-gray-100 pt-3 text-xs space-y-1 text-gray-500 max-h-32 overflow-y-auto font-bold">
                                        {courses.map(c => <li key={c.id} className="bg-gray-50 p-1.5 rounded mb-1">✓ {c.name}</li>)}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
